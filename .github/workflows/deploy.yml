name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_ROUTE: ${{ secrets.FTP_ROUTE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Check required secrets
        run: |
          test -n "$FTP_USERNAME" || { echo "::error::Missing FTP_USERNAME secret"; exit 1; }
          test -n "$FTP_SERVER" || { echo "::error::Missing FTP_SERVER secret"; exit 1; }
          test -n "$FTP_ROUTE" || { echo "::error::Missing FTP_ROUTE secret"; exit 1; }
          test "$FTP_ROUTE" != "/" || { echo "::error::FTP_ROUTE must not be /"; exit 1; }
          test "$FTP_ROUTE" != "." || { echo "::error::FTP_ROUTE must not be ."; exit 1; }

      - name: Add known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 "$FTP_SERVER" >> ~/.ssh/known_hosts

      - name: Deploy to live webroot
        run: |
          rsync -avz --delete \
            --exclude ".git*" \
            --exclude ".github" \
            --exclude "README.md" \
            -e "ssh -p 22" \
            ./ "$FTP_USERNAME@$FTP_SERVER:$FTP_ROUTE"

      - name: Purge Uniweb cache
        run: ssh -p 22 "$FTP_USERNAME@$FTP_SERVER" cache-purge
 